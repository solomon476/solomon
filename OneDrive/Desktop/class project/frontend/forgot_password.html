<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Request a password reset for your SecureAuth account.">
    <title>Forgot Password – SecureAuth</title>
    <link rel="stylesheet" href="../assets/style.css">
</head>

<body>
    <div class="page-center">
        <div class="auth-card">

            <div class="logo">
                <div class="logo-icon">🔄</div>
                <h1>Reset Password</h1>
                <p class="subtitle">Enter your email to receive a reset token</p>
            </div>

            <!-- Alerts (shown by JS) -->
            <div id="alert_box" style="display:none;"></div>

            <!-- Request Form -->
            <form id="forgot_form" novalidate>
                <div class="form-group">
                    <label for="email">Registered Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email"
                            required>
                    </div>
                    <span class="field-error" id="email_error"></span>
                </div>

                <button type="submit" class="btn btn-primary" id="reset_request_submit">
                    📤 Send Reset Token
                </button>
            </form>

            <!-- Token Display (shown after submission) -->
            <div id="token_display" style="display:none;">
                <div class="alert alert-warning" style="flex-direction:column;gap:0.4rem;">
                    <strong>📋 Demo Mode – Your Reset Token:</strong>
                    <code id="token_value" style="
                        background:rgba(255,255,255,0.08);
                        padding:0.5rem 0.75rem;
                        border-radius:6px;
                        font-size:0.78rem;
                        word-break:break-all;
                        display:block;
                        margin-top:0.25rem;
                        cursor:pointer;" title="Click to copy"
                        onclick="navigator.clipboard.writeText(this.textContent).then(()=>{ this.style.color='#4ade80'; })">
                    </code>
                    <small style="color:var(--text-secondary);">
                        ⏱️ Valid for 1 hour. Click token to copy, then proceed below.
                    </small>
                    <a id="proceed_link" href="reset_password.html" class="btn btn-primary"
                        style="width:100%;margin-top:0.5rem;">
                        Enter Reset Token →
                    </a>
                </div>
            </div>

            <div class="auth-footer">
                <a href="login.html">← Back to Log In</a>
            </div>
        </div>
    </div>

    <script src="../assets/script.js"></script>
    <script>
        document.getElementById('forgot_form').addEventListener('submit', function (e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const alertBox = document.getElementById('alert_box');

            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                alertBox.innerHTML = '<div class="alert alert-error">⚠️ Please enter a valid email address.</div>';
                alertBox.style.display = 'block';
                return;
            }

            // Generic message (no enumeration) — always show the same
            alertBox.innerHTML = '<div class="alert alert-success">✅ If that email is registered, a reset token has been generated. Copy the token below.</div>';
            alertBox.style.display = 'block';

            // Check if user exists in localStorage (for demo purposes)
            const users = JSON.parse(localStorage.getItem('sa_users') || '[]');
            const user = users.find(u => u.email === email);

            if (user) {
                // Generate a demo token (32 random hex bytes = 64 chars)
                const array = new Uint8Array(32);
                crypto.getRandomValues(array);
                const token = Array.from(array).map(b => b.toString(16).padStart(2, '0')).join('');

                // Store token with expiry (1 hour from now)
                localStorage.setItem('sa_reset_token', JSON.stringify({
                    token,
                    email,
                    expires: Date.now() + 3600000
                }));

                // Display token
                document.getElementById('token_value').textContent = token;
                document.getElementById('token_display').style.display = 'block';
                document.getElementById('proceed_link').href =
                    'reset_password.html?email=' + encodeURIComponent(email);
            }

            // Hide the form
            this.style.display = 'none';
        });
    </script>
</body>

</html>
