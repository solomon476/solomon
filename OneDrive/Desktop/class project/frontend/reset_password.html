<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Set a new password for your SecureAuth account.">
    <title>Set New Password – SecureAuth</title>
    <link rel="stylesheet" href="../assets/style.css">
</head>

<body>
    <div class="page-center">
        <div class="auth-card">

            <div class="logo">
                <div class="logo-icon">🔏</div>
                <h1>Set New Password</h1>
                <p class="subtitle">Enter your reset token and choose a new password</p>
            </div>

            <!-- Alert area -->
            <div id="alert_box" style="display:none;"></div>

            <form id="reset_form" novalidate>

                <!-- Email -->
                <div class="form-group">
                    <label for="email">Registered Email</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email"
                            required>
                    </div>
                </div>

                <!-- Reset Token -->
                <div class="form-group">
                    <label for="token">Reset Token</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🎟️</span>
                        <input type="text" id="token" name="token" placeholder="Paste your 64-character token here"
                            maxlength="64" autocomplete="off" required>
                    </div>
                    <span class="field-error" id="token_error"></span>
                </div>

                <!-- New Password -->
                <div class="form-group">
                    <label for="new_password">New Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="new_password" name="new_password" placeholder="At least 8 characters"
                            autocomplete="new-password" required>
                        <button type="button" class="toggle-password" data-target="new_password"
                            aria-label="Toggle">👁️</button>
                    </div>
                    <span class="field-error" id="new_password_error"></span>
                    <div class="strength-meter">
                        <div class="strength-meter-fill" id="strength_fill"></div>
                    </div>
                    <span class="strength-label" id="strength_label"></span>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <label for="confirm_password">Confirm New Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="confirm_password" name="confirm_password"
                            placeholder="Repeat your new password" autocomplete="new-password" required>
                        <button type="button" class="toggle-password" data-target="confirm_password"
                            aria-label="Toggle">👁️</button>
                    </div>
                    <span class="field-error" id="confirm_password_error"></span>
                </div>

                <button type="submit" class="btn btn-primary" id="reset_submit">
                    🔏 Set New Password
                </button>
            </form>

            <div class="auth-footer">
                <a href="forgot_password.html">← Request a new token</a>
                &nbsp;·&nbsp;
                <a href="login.html">Log In</a>
            </div>
        </div>
    </div>

    <script src="../assets/script.js"></script>
    <script>
        // Pre-fill email from URL query string
        const params = new URLSearchParams(window.location.search);
        const preEmail = params.get('email');
        if (preEmail) document.getElementById('email').value = preEmail;

        document.getElementById('reset_form').addEventListener('submit', function (e) {
            e.preventDefault();

            const alertBox = document.getElementById('alert_box');
            const email = document.getElementById('email').value.trim();
            const token = document.getElementById('token').value.trim();
            const newPw = document.getElementById('new_password').value;
            const confirmPw = document.getElementById('confirm_password').value;

            alertBox.style.display = 'none';

            // Basic validation
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                alertBox.innerHTML = '<div class="alert alert-error">⚠️ Please enter a valid email address.</div>';
                alertBox.style.display = 'block'; return;
            }
            if (token.length !== 64) {
                alertBox.innerHTML = '<div class="alert alert-error">⚠️ Token must be exactly 64 characters.</div>';
                alertBox.style.display = 'block'; return;
            }
            if (newPw.length < 8) {
                alertBox.innerHTML = '<div class="alert alert-error">⚠️ Password must be at least 8 characters.</div>';
                alertBox.style.display = 'block'; return;
            }
            if (newPw !== confirmPw) {
                alertBox.innerHTML = '<div class="alert alert-error">⚠️ Passwords do not match.</div>';
                alertBox.style.display = 'block'; return;
            }

            // Verify stored token
            const stored = JSON.parse(localStorage.getItem('sa_reset_token') || 'null');

            if (!stored) {
                alertBox.innerHTML = '<div class="alert alert-error">⚠️ No pending reset request found. Please request a new token.</div>';
                alertBox.style.display = 'block'; return;
            }
            if (Date.now() > stored.expires) {
                localStorage.removeItem('sa_reset_token');
                alertBox.innerHTML = '<div class="alert alert-error">⚠️ This reset token has expired. Please request a new one.</div>';
                alertBox.style.display = 'block'; return;
            }
            if (stored.token !== token || stored.email !== email) {
                alertBox.innerHTML = '<div class="alert alert-error">⚠️ Invalid reset token or email. Please check and try again.</div>';
                alertBox.style.display = 'block'; return;
            }

            // SUCCESS — update password in localStorage users array
            const users = JSON.parse(localStorage.getItem('sa_users') || '[]');
            const idx = users.findIndex(u => u.email === email);
            if (idx !== -1) {
                users[idx].password = newPw;   // In real app: bcrypt hash on server
                localStorage.setItem('sa_users', JSON.stringify(users));
            }

            // Delete token (single-use)
            localStorage.removeItem('sa_reset_token');

            // Flash and redirect
            localStorage.setItem('sa_flash', 'Password reset successfully! Please log in with your new password.');
            window.location.href = 'login.html';
        });
    </script>
</body>

</html>
